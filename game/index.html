<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIGRUNNER</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
      canvas { display: block; }
      /* Rig stat readout, top-left. White on the dark scene; ignores the mouse so it never
         intercepts the build drag / camera controls underneath it. */
      #stats {
        position: fixed;
        top: 12px;
        left: 14px;
        margin: 0;
        color: #f2f2f2;
        font: 12px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
        white-space: pre;
        pointer-events: none;
        user-select: none;
      }
      /* Scrap wallet readout, top-right. Temporary UI: the banked-scrap total the workshop drain
         feeds. glow_green to read as "owned resource"; ignores the mouse like #stats. */
      #wallet {
        position: fixed;
        top: 12px;
        right: 16px;
        margin: 0;
        color: #59ff9f;
        font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
        white-space: pre;
        pointer-events: none;
        user-select: none;
      }
      /* Workshop tab, bottom-centre. Shown only while the rig is in a workshop zone (and the
         overlay is closed). Slides/fades in via a transition; the .hidden class drives it off
         rather than display:none so it never pops. */
      #workshop-tab {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%) translateY(0);
        padding: 9px 18px;
        border: 1px solid rgba(89, 255, 159, 0.5);
        border-radius: 8px 8px 0 0;
        background: rgba(20, 28, 24, 0.92);
        color: #59ff9f;
        font: 13px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.04em;
        cursor: pointer;
        user-select: none;
        box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.5);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }
      #workshop-tab:hover { background: rgba(28, 40, 34, 0.96); }
      #workshop-tab.hidden {
        opacity: 0;
        transform: translateX(-50%) translateY(14px);
        pointer-events: none;
      }
      /* Full-screen workshop overlay. Backdrop dims + intercepts the mouse (pointer-events:auto),
         so the frozen scene underneath can't be dragged/orbited while it's open. An empty shell
         in P1 — the inventory browser, portrait and bench land in later PRs. */
      #workshop-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(8, 10, 12, 0.72);
        font: 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        color: #f2f2f2;
        transition: opacity 0.2s ease;
      }
      #workshop-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .workshop-panel {
        width: min(880px, 92vw);
        height: min(620px, 88vh);
        display: flex;
        flex-direction: column;
        background: #15191c;
        border: 1px solid #2c343a;
        border-radius: 10px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.6);
        overflow: hidden;
      }
      .workshop-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid #2c343a;
        background: #1b2125;
      }
      .workshop-header h2 {
        margin: 0;
        font: 600 14px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.08em;
        color: #59ff9f;
      }
      #workshop-close {
        width: 26px;
        height: 26px;
        border: 1px solid #2c343a;
        border-radius: 6px;
        background: transparent;
        color: #c7ced3;
        font-size: 13px;
        cursor: pointer;
      }
      #workshop-close:hover { background: #232b30; color: #fff; }
      .workshop-body {
        flex: 1;
        display: flex;
        gap: 12px;
        padding: 14px;
        min-height: 0; /* let the scrollable columns shrink inside the flex row */
      }
      .wk-col {
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: #11151800;
      }
      .wk-inventory { width: 230px; }
      .wk-bench { flex: 1; min-width: 0; }
      .wk-inspect { width: 300px; }
      .wk-col-title {
        margin: 0 0 8px;
        font: 600 11px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #8b97a0;
      }
      /* Inventory list — owned, unplaced parts. Scrolls when it overflows. */
      .wk-inv-list {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
        border: 1px solid #2c343a;
        border-radius: 8px;
        background: #10151800;
      }
      .wk-inv-list.drop-hover { border-color: #59ff9f; background: rgba(89, 255, 159, 0.06); }
      .wk-inv-empty { color: #5a646b; font-size: 12px; padding: 6px 2px; }
      /* A part chip — draggable, selectable. Used in the inventory list and inside a bench slot. */
      .wk-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0; /* let the name truncate instead of forcing the chip wider than its column */
        padding: 7px 9px;
        border: 1px solid #2c343a;
        border-radius: 7px;
        background: #1b2125;
        color: #e6ebee;
        cursor: grab;
        user-select: none;
        touch-action: none;
      }
      .wk-chip:hover { background: #222a2f; }
      .wk-chip.selected { border-color: #59ff9f; box-shadow: 0 0 0 1px rgba(89, 255, 159, 0.5) inset; }
      .wk-chip.dragging { opacity: 0.3; }
      .wk-chip .wk-dot {
        width: 9px; height: 9px; border-radius: 50%; flex: none;
      }
      .wk-chip.electric .wk-dot { background: #59ff9f; }
      .wk-chip.mechanical .wk-dot { background: #8a4b2f; }
      .wk-chip.storage .wk-dot { background: #2f6f9f; }
      /* A composed product (assembled engine / built container) reads as a finished article: a
         brighter fill + a left accent in its type colour, so it's clearly not a loose part. */
      .wk-chip.product {
        background: #20282d;
        border-left: 3px solid #59ff9f;
      }
      .wk-chip.product.mechanical { border-left-color: #8a4b2f; }
      .wk-chip.product.storage { border-left-color: #2f6f9f; }
      /* A read-only chip — a product's sub-part shown on the bench while inspecting it. Dimmed and
         inert (no drag/hover/select), so it reads as "this is what it's made of", not a live slot. */
      .wk-chip.disabled {
        opacity: 0.5;
        cursor: default;
        pointer-events: none;
      }
      .wk-chip .wk-name {
        flex: 1;
        min-width: 0;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .wk-chip .wk-slot-tag { flex: none; font-size: 10px; color: #8b97a0; letter-spacing: 0.05em; }
      /* A floating clone that follows the cursor while dragging. */
      .wk-ghost {
        position: fixed;
        z-index: 10;
        pointer-events: none;
        margin: 0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        transition: left 0.14s ease-out, top 0.14s ease-out;
      }
      /* Recipe picker — one tab per buildable; the active one is highlighted. */
      .wk-recipe-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .wk-recipe-tab {
        padding: 6px 11px;
        border: 1px solid #2c343a;
        border-radius: 7px;
        background: transparent;
        color: #8b97a0;
        font: 11px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.04em;
        cursor: pointer;
      }
      .wk-recipe-tab:hover { background: #1b2125; color: #c7ced3; }
      .wk-recipe-tab.active {
        border-color: #59ff9f;
        color: #59ff9f;
        background: rgba(89, 255, 159, 0.08);
      }
      /* Recipe header — what's being built + progress (e.g. "Engine · 2 / 4 parts"). */
      .wk-recipe {
        margin-bottom: 10px;
        padding: 7px 10px;
        border: 1px solid #2c343a;
        border-radius: 7px;
        background: #1b2125;
        color: #c7ced3;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      /* The recipe's role slots — a vertical list (one per required part), so a slot is always wide
         enough for its chip and never spills into the neighbouring column. */
      .wk-bench-slots {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .wk-slot {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px;
        border: 1px dashed #3a444b;
        border-radius: 8px;
        background: #10151800;
        overflow: hidden;
      }
      .wk-slot.drop-hover { border-color: #59ff9f; border-style: solid; background: rgba(89, 255, 159, 0.06); }
      .wk-slot.drop-reject { border-color: #8a4b2f; }
      .wk-slot-label {
        font: 600 10px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #6b757c;
      }
      .wk-slot-empty { color: #4d575e; font-size: 11px; font-style: italic; }
      @keyframes wk-snap {
        0% { transform: scale(1.12); }
        60% { transform: scale(0.97); }
        100% { transform: scale(1); }
      }
      .wk-chip.snapped { animation: wk-snap 0.16s ease-out; }
      /* Assemble action — sits under the bench slots. Enabled (glow_green) only when the slots are
         full of one consistent type; disabled it shows the reason ("Fill all…", "Parts don’t match…"). */
      .wk-assemble {
        margin-top: 10px;
        padding: 9px 12px;
        border: 1px solid #59ff9f;
        border-radius: 8px;
        background: rgba(89, 255, 159, 0.1);
        color: #59ff9f;
        font: 600 12px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.06em;
        cursor: pointer;
      }
      .wk-assemble:hover:not(:disabled) { background: rgba(89, 255, 159, 0.18); }
      .wk-assemble:disabled {
        border-color: #2c343a;
        background: #161b1e;
        color: #5a646b;
        cursor: not-allowed;
      }
      /* Detail panel — slot/type/attrs of the selected part. */
      .wk-detail {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 12px;
        border: 1px solid #2c343a;
        border-radius: 8px;
        background: #10151800;
      }
      .wk-detail-empty { color: #5a646b; font-size: 12px; }
      .wk-detail h4 { margin: 0 0 4px; font-size: 14px; color: #f2f2f2; }
      .wk-detail .wk-detail-sub { color: #8b97a0; font-size: 11px; margin-bottom: 10px; letter-spacing: 0.04em; }
      .wk-attrs { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; font-size: 12px; }
      .wk-attrs .k { color: #8b97a0; }
      .wk-attrs .v { color: #e6ebee; }
      .wk-attrs .k.reserved, .wk-attrs .v.reserved { color: #5a646b; }
      /* A product's actions, side by side: Move to World (eject to the rig) + Dismantle. */
      .wk-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
      /* Move to World — sends the product out of inventory into the world to be mounted (green =
         "build it onto the rig", matching the assemble action). */
      .wk-move {
        padding: 7px 11px;
        border: 1px solid #2f6f4a;
        border-radius: 7px;
        background: rgba(89, 255, 159, 0.10);
        color: #7fe0a5;
        font: 600 11px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.06em;
        cursor: pointer;
      }
      .wk-move:hover { background: rgba(89, 255, 159, 0.18); }
      /* Dismantle — returns a product's parts to inventory (rust = the "take it apart" inverse of
         the green assemble). */
      .wk-dismantle {
        padding: 7px 11px;
        border: 1px solid #8a4b2f;
        border-radius: 7px;
        background: rgba(138, 75, 47, 0.12);
        color: #d98a63;
        font: 600 11px/1 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 0.06em;
        cursor: pointer;
      }
      .wk-dismantle:hover { background: rgba(138, 75, 47, 0.22); }
      /* Scrollbars inside the overlay. The OS default (chunky, light-grey) clashes with the dark
         panel, so every scrollable column wears a thin dark thumb on a transparent track. The detail
         pane also reserves a stable gutter, so the scrollbar appearing on a tall selection never
         nudges the text sideways. */
      #workshop-overlay .wk-inv-list,
      #workshop-overlay .wk-bench-slots,
      #workshop-overlay .wk-detail {
        scrollbar-width: thin;                  /* Firefox */
        scrollbar-color: #3a444b transparent;   /* thumb / track */
      }
      #workshop-overlay .wk-detail { scrollbar-gutter: stable; }
      #workshop-overlay .wk-inv-list::-webkit-scrollbar,
      #workshop-overlay .wk-bench-slots::-webkit-scrollbar,
      #workshop-overlay .wk-detail::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      #workshop-overlay ::-webkit-scrollbar-track { background: transparent; }
      #workshop-overlay ::-webkit-scrollbar-thumb {
        background: #2c343a;
        border-radius: 8px;
        border: 2px solid transparent;          /* inset the thumb so it reads as a slim pill */
        background-clip: padding-box;
      }
      #workshop-overlay ::-webkit-scrollbar-thumb:hover { background: #3a444b; }
      #workshop-overlay ::-webkit-scrollbar-corner { background: transparent; }
      /* Portrait host — a fixed square so the preview doesn't stretch into a tall, wasteful strip;
         the turntable canvas sizes itself to fill it. The detail panel below takes the slack. */
      .wk-portrait-host {
        flex: none;
        width: 100%;
        aspect-ratio: 1 / 1;
        margin-bottom: 12px;
        border: 1px solid #2c343a;
        border-radius: 8px;
        background: #0d1114;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <canvas id="view"></canvas>
    <pre id="stats"></pre>
    <pre id="wallet"></pre>
    <button id="workshop-tab" class="hidden" type="button">🔧 Open Workshop</button>
    <div id="workshop-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Workshop">
      <div class="workshop-panel">
        <header class="workshop-header">
          <h2>🔧 WORKSHOP</h2>
          <button id="workshop-close" type="button" aria-label="Close workshop">✕</button>
        </header>
        <div class="workshop-body">
          <section class="wk-col wk-inventory">
            <h3 class="wk-col-title">Inventory</h3>
            <div id="wk-inv-list" class="wk-inv-list" data-drop="inventory"></div>
          </section>
          <section class="wk-col wk-bench">
            <h3 class="wk-col-title">Assembly Bench</h3>
            <div id="wk-recipe-tabs" class="wk-recipe-tabs"></div>
            <div id="wk-recipe" class="wk-recipe"></div>
            <div id="wk-bench-slots" class="wk-bench-slots"></div>
            <button id="wk-assemble" class="wk-assemble" type="button" disabled></button>
          </section>
          <section class="wk-col wk-inspect">
            <h3 class="wk-col-title">Preview</h3>
            <div id="wk-portrait-host" class="wk-portrait-host"></div>
            <div id="wk-detail" class="wk-detail"></div>
          </section>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
